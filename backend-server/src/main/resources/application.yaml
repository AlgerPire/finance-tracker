# =============================================================================
# Full Security Application Configuration
# =============================================================================
# This configuration file uses YAML format for better readability and
# organization. Environment-specific properties can be overridden using
# Spring profiles (dev, prod) or environment variables.
# =============================================================================

spring:
  application:
    name: backend-server

  # =============================================================================
  # Database Configuration (PostgreSQL)
  # =============================================================================
  datasource:
    # Local development configuration
    url: jdbc:postgresql://localhost:5432/finance-tracker
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

    # HikariCP Connection Pool Configuration
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: FinanceTrackerHikariCP

  # =============================================================================
  # JPA / Hibernate Configuration
  # =============================================================================
  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        # Batch processing optimization
        jdbc:
          batch_size: 20
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        # Disable second-level cache to reduce memory usage
        cache:
          use_second_level_cache: false
          use_query_cache: false

  # =============================================================================
  # File Upload Configuration
  # =============================================================================
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# =============================================================================
# Server Configuration
# =============================================================================
server:
  servlet:
    session:
      cookie:
        secure: true
        same-site: none
        http-only: true
        max-age: 432000  # 5 days in seconds

  # Response Compression
  compression:
    enabled: true
    mime-types:
      - application/json
      - application/xml
      - text/html
      - text/xml
      - text/plain
      - application/javascript
      - text/css
    min-response-size: 1024

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level:
    root: INFO
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
      springframework:
        web: INFO
    com:
      zaxxer:
        hikari: INFO
      finance_tracker: DEBUG

# =============================================================================
# Application Security Properties (JWT)
# =============================================================================
finance_tracker:
  app:
    jwtCookieName: finance-tracker-token
    jwtRefreshCookieName: finance-tracker-refresh
    # JWT Secret Key (should be stored in environment variable in production)
    jwtSecret: eyJhbGciOiJIUzUxMiJ96eyJSb2xlIjoiQWRtaW4iLCJJc3N1ZXIiOiJJc3N1ZXIiLCJVc2VybmFtZSI6IkphdmFJblVzZSIsImV4cCI6MTcwODA3ODcwMiwiaWF0IjoxNzA4MDc4NzAyfQ7H89bDVoR4G3NFrg85wNTO3RZ4lcSgxr6o7uZHVrB67CadZ3s8KA2jcsDzgsQjnXrp9McdV88um9znSgHuB0RaA
    # Token expiration: 5 days (in milliseconds)
    jwtExpirationMs: 432000000
    # Refresh token expiration: 7 days (in milliseconds)
    jwtRefreshExpirationMs: 604800000
#    admin setup
    admin:
      username: ${ADMIN_USERNAME:admin}
      email: ${ADMIN_EMAIL:admin@admin.com}
      password: ${ADMIN_PASSWORD:financeTracker}
    rate-limit:
      auth-max-requests: ${RATE_LIMIT_AUTH_MAX:10}
      auth-refill-minutes: ${RATE_LIMIT_AUTH_REFILL_MINUTES:1}


---
# =============================================================================
# Development Profile
# =============================================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/finance-tracker
    username: postgres
    password: 1234

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
    com:
      finance_tracker: DEBUG

---
# =============================================================================
# Production Profile
# =============================================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

logging:
  level:
    root: WARN
    org:
      hibernate:
        SQL: ERROR
        type:
          descriptor:
            sql:
              BasicBinder: ERROR
      springframework:
        web: WARN
    com:
      finance_tracker: INFO
