# =============================================================================
# Finance Tracker – Docker Compose
# =============================================================================
# Usage:
#   1. Copy .env.example to .env and fill in your secrets.
#   2. docker compose up --build          (first run / after code changes)
#   3. docker compose up -d               (start in background)
#   4. docker compose down                (stop containers)
#   5. docker compose down -v             (stop + delete DB volume)
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: finance-tracker-db
    environment:
      POSTGRES_DB:       finance-tracker
      POSTGRES_USER:     ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d finance-tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  app:
    build:
      context: ./backend-server
      dockerfile: Dockerfile
    container_name: finance-tracker-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod

      DATABASE_URL:  jdbc:postgresql://db:5432/finance-tracker
      DB_USERNAME:   ${DB_USERNAME:-postgres}
      DB_PASSWORD:   ${DB_PASSWORD:-postgres}

      # JWT
      FINANCE_TRACKER_APP_JWTSECRET:            ${JWT_SECRET}
      FINANCE_TRACKER_APP_JWTEXPIRATIONMS:      ${JWT_EXPIRATION_MS:-432000000}
      FINANCE_TRACKER_APP_JWTREFRESHEXPIRATIONMS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}

      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL:    ${ADMIN_EMAIL:-admin@admin.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-financeTracker}

      RATE_LIMIT_AUTH_MAX:             ${RATE_LIMIT_AUTH_MAX:-10}
      RATE_LIMIT_AUTH_REFILL_MINUTES:  ${RATE_LIMIT_AUTH_REFILL_MINUTES:-1}

      SPRING_SERVER_SERVLET_SESSION_COOKIE_SECURE: "false"

    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
